<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Kingston Trading Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 40px 36px; width: 100%; max-width: 360px; }
  h1 { font-size: 1.2rem; font-weight: 600; color: #58a6ff; margin-bottom: 28px; text-align: center; }
  label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 6px; }
  input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 0.9rem; padding: 10px 12px; margin-bottom: 16px; outline: none; }
  input:focus { border-color: #58a6ff; }
  button { width: 100%; background: #238636; color: #fff; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; padding: 10px; cursor: pointer; margin-top: 4px; }
  button:hover { background: #2ea043; }
  .error { background: #3d1a1a; border: 1px solid #f85149; border-radius: 6px; color: #f85149; font-size: 0.82rem; padding: 10px 12px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>Kingston Trading Engine</h1>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" autofocus>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
